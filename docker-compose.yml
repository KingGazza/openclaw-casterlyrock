version: '3.8'

services:
  openclaw:
    image: ghcr.io/openclaw/openclaw:latest
    container_name: openclaw-gateway
    restart: unless-stopped
    user: "root"
    ports:
      - "18789:18789"
      - "18791:18791"
    volumes:
      - openclaw_data:/home/support/.openclaw
    # We use 'custom' to unlock the --address flag
    # We use --address 0.0.0.0 to fix the 'Connection Refused'
    # We use --allow-unconfigured to bypass the setup block
    command: >
      node dist/index.js gateway 
      --bind custom 
      --allow-unconfigured
      --port 18789

volumes:
  openclaw_data:
