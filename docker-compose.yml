version: '3.8'

services:
  openclaw:
    image: ghcr.io/openclaw/openclaw:latest
    container_name: openclaw-gateway
    restart: unless-stopped
    user: "root"
    network_mode: host  # This uses the host's network directly
    environment:
      - NODE_ENV=production
      - OPENCLAW_GATEWAY_BIND=lan
      - OPENCLAW_GATEWAY_PORT=18789
      - OPENCLAW_GATEWAY_ALLOW_UNCONFIGURED=true
    volumes:
      ##- /home/support/openclaw/openclaw.json:/root/.openclaw/openclaw.json:rw
      - openclaw_data:/root/.openclaw
    command: ["node", "dist/index.js", "gateway", "--allow-unconfigured"]

volumes:
  openclaw_data:
