version: '3.8'

services:
  openclaw:
    image: ghcr.io/openclaw/openclaw:latest
    container_name: openclaw-gateway
    restart: unless-stopped
    user: "root"
    ports:
      - "18789:18789"
      - "18791:18791"
    environment:
      - NODE_ENV=production
      # This follows the naming convention for the key the error mentioned:
      - OPENCLAW_GATEWAY_BIND=custom
      - OPENCLAW_GATEWAY_CUSTOM_BIND_HOST=0.0.0.0
      - OPENCLAW_BROWSER_BIND=custom
      - OPENCLAW_BROWSER_CUSTOM_BIND_HOST=0.0.0.0
      - OPENCLAW_GATEWAY_ALLOW_UNCONFIGURED=true
    volumes:
      - openclaw_data:/root/.openclaw
    command: ["node", "dist/index.js", "gateway", "--allow-unconfigured"]

volumes:
  openclaw_data:
