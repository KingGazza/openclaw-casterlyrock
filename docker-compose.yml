version: '3.8'

services:
  openclaw:
    image: ghcr.io/openclaw/openclaw:latest
    container_name: openclaw-gateway
    restart: unless-stopped
    ports:
      - "18789:18789"
      - "18791:18791"
    environment:
      - NODE_ENV=production
      - OPENCLAW_GATEWAY_HOST=0.0.0.0
    volumes:
      - openclaw_data:/home/node/.openclaw
    # Added --allow-unconfigured to bypass the setup block
    command: ["node", "dist/index.js", "gateway", "--bind", "0.0.0.0", "--allow-unconfigured"]

volumes:
  openclaw_data:
